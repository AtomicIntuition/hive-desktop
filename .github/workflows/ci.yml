name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @hive-desktop/shared build

      - name: Type check runtime
        run: pnpm --filter @hive-desktop/runtime exec tsc --noEmit

      - name: Type check frontend
        run: pnpm --filter @hive-desktop/app lint

      - name: Test runtime
        run: pnpm --filter @hive-desktop/runtime test

      - name: Test frontend
        run: pnpm --filter @hive-desktop/app test

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Rust check
        working-directory: apps/desktop/src-tauri
        run: cargo check
